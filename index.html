<!DOCTYPE html>
<html>
<head>
<title>Roboflow Detection</title>
</head>

<body>

<h2>Détection IA</h2>

<h3>Importer une image</h3>
<input type="file" id="fileInput">
<br><br>

<h3>Ou prendre une photo</h3>
<video id="video" width="300" autoplay></video>
<br>
<button onclick="takePhoto()">Prendre Photo</button>

<br><br>

<button onclick="sendImage()">Detect</button>

<canvas id="canvas" style="display:none;"></canvas>

<pre id="result"></pre>

<script>

let imageBase64 = ""

document.getElementById("fileInput").addEventListener("change", function(e){

let reader = new FileReader()

reader.onload = function(){
imageBase64 = reader.result.split(",")[1]
}

reader.readAsDataURL(e.target.files[0])

})


navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
document.getElementById("video").srcObject = stream
})


function takePhoto(){

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

let ctx = canvas.getContext("2d")

ctx.drawImage(video,0,0)

imageBase64 = canvas.toDataURL("image/jpeg").split(",")[1]

}


async function sendImage(){

let response = await fetch("https://serverless.roboflow.com/chaymas-workspace/workflows/detect-count-and-visualize",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

api_key:"XnEPAghFKADxjHz15SJS",

inputs:{
image:{
type:"base64",
value:imageBase64
}
}

})

})

let data = await response.json()

document.getElementById("result").textContent = JSON.stringify(data,null,2)

}

</script>

</body>
</html>
