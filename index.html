<script>

async function analyser(){

let file=document.getElementById("imageInput").files[0]

if(!file){
alert("Please choose image")
return
}

let reader=new FileReader()

reader.onloadend=async function(){

let base64=reader.result.split(",")[1]

let response=await fetch(
"https://serverless.roboflow.com/chaymas-workspace/workflows/detect-count-and-visualize",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
api_key:"XnEPAghFKADxjHz15SJS",
inputs:{
image:{
type:"base64",
value:base64
}
}
})
})

let data=await response.json()

console.log(data)

let predictions=[]
let count=0

/* استخراج الصناديق */
if(data.outputs){

data.outputs.forEach(o=>{

if(o.predictions){
predictions=o.predictions
}

if(o.count_objects){
count=Object.values(o.count_objects)[0]
}

})

}

/* عرض العدد */
if(count===0 && Array.isArray(predictions)){
count=predictions.length
}

document.getElementById("count").innerText=
"Number of tables: "+count

/* عرض الصورة */
let img=document.getElementById("output")
img.src=reader.result

img.onload=function(){

let canvas=document.getElementById("canvas")
canvas.width=img.width
canvas.height=img.height

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="red"
ctx.lineWidth=3

if(Array.isArray(predictions)){

predictions.forEach(p=>{

let x=p.x-p.width/2
let y=p.y-p.height/2

ctx.strokeRect(x,y,p.width,p.height)

})

}

}

}

reader.readAsDataURL(file)

}

</script>
