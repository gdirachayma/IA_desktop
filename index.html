<script>

async function analyser(){

let file=document.getElementById("imageInput").files[0]

if(!file){
alert("choose image first")
return
}

let reader=new FileReader()

reader.onloadend=async function(){

let base64=reader.result.split(",")[1]

let response=await fetch(
"https://serverless.roboflow.com/chaymas-workspace/workflows/detect-count-and-visualize",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
api_key:"YOUR_API_KEY",
inputs:{
image:{
type:"base64",
value:base64
}
}
})
})

let data=await response.json()

console.log(data)

/* استخراج العدد */

let count=0

if(data.outputs && data.outputs.count_objects){

count=Object.values(data.outputs.count_objects)[0]

}

/* استخراج الصناديق */

let predictions=[]

if(data.outputs && data.outputs.predictions){

predictions=data.outputs.predictions

}

/* عرض العدد */

document.getElementById("count").innerText=
"Number of tables: "+count

/* عرض الصورة */

let img=document.getElementById("output")
img.src=reader.result

img.onload=function(){

let canvas=document.getElementById("canvas")
canvas.width=img.width
canvas.height=img.height

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="red"
ctx.lineWidth=3

if(Array.isArray(predictions)){

predictions.forEach(p=>{

let x=p.x-p.width/2
let y=p.y-p.height/2

ctx.strokeRect(x,y,p.width,p.height)

})

}

}

}

reader.readAsDataURL(file)

}

</script>
